services:
  cuda-validator:
    build:
      context: .
      dockerfile: Dockerfile.cuda-validator
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - RPC_BIND=10.200.200.2
      - RPC_PORT=8080
    volumes:
      - ./bsv-data:/data
      - ./cuda:/app/cuda:ro
    ports:
      - "10.200.200.2:8080:8080"  # WireGuard interface only
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]